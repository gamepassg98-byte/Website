<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>ClipVault</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🎬 ClipVault</h1>
      <p class="subtitle">Private Clip Collection</p>
    </header>

    <div class="add-section">
      <input type="text" id="linkInput" placeholder="Paste Google Drive link..." class="input">
      <input type="text" id="nameInput" placeholder="Clip name..." class="input">
      <button class="btn" onclick="addClip()">+ Add Clip</button>
      <div class="sync-row">
        <button class="btn btn-outline" onclick="exportVault()">📤 Export Sync Code</button>
        <button class="btn btn-outline" onclick="importVault()">📥 Import Sync Code</button>
      </div>
    </div>

    <div class="section-header">
      <h2>📼 My Clips</h2>
      <span id="clipCount" class="count">0 clips</span>
    </div>

    <div id="videoGrid" class="video-grid">
      <div class="empty-state">
        <div>🎬</div>
        <p>No clips yet. Paste a Google Drive link above!</p>
      </div>
    </div>
  </div>

  <div id="playerModal" class="modal" style="display:none;">
    <div class="modal-inner">
      <div class="modal-header">
        <button class="btn-close" onclick="closePlayer()">✕</button>
        <span id="playerTitle" class="modal-title"></span>
      </div>
      <div id="playerContainer" class="player-container"></div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
